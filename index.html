<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Silo - Moretto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Estilos da Interface Mobile */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #1e3c72; padding: 10px; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header { background: #1e3c72; color: white; padding: 15px; text-align: center; }
        .content { padding: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-shift { padding: 12px; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; background: #f9f9f9; font-weight: bold; }
        .btn-shift.active { border-color: #1e3c72; background: #eef2f7; color: #1e3c72; }
        .nav-month { display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .day { aspect-ratio: 1; border: 1px solid #eee; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .day.selected { background: #1e3c72; color: white; }
        .total-info { background: #f4f4f4; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; border-left: 5px solid #1e3c72; }
        .btn-export { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 15px; }

        /* --- ESTRUTURA DO PDF PADRONIZADA (OCULTA NO CELULAR) --- */
        #pdf-render {
            display: none;
            width: 700px;
            padding: 30px;
            background: white;
            color: black;
            font-family: Arial, sans-serif;
        }
        .pdf-header { text-align: center; border-bottom: 3px solid #1e3c72; padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-info-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 14px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th { background: #1e3c72; color: white; padding: 10px; font-size: 12px; border: 1px solid #333; }
        .pdf-table td { padding: 8px; text-align: center; border: 1px solid #333; font-size: 12px; }
        .pdf-footer { margin-top: 20px; padding: 15px; background: #f0f0f0; border: 1px solid #ccc; }
        .pdf-signatures { margin-top: 50px; display: flex; justify-content: space-between; }
        .sig-line { width: 40%; border-top: 1px solid black; text-align: center; padding-top: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h3>Posto Silo - Moretto</h3></div>
    <div class="content">
        <label>Nome do Segurança:</label>
        <input type="text" id="name" value="Moretto">

        <label>Turno:</label>
        <div class="shift-grid">
            <div class="btn-shift" id="s-day" onclick="selectShift('Diurno')">Diurno</div>
            <div class="btn-shift" id="s-night" onclick="selectShift('Noturno')">Noturno</div>
        </div>

        <div class="nav-month">
            <button onclick="changeMonth(-1)"><b> < </b></button>
            <span id="labelMonth" style="font-weight: bold;"></span>
            <button onclick="changeMonth(1)"><b> > </b></button>
        </div>

        <div class="calendar" id="cal"></div>

        <div class="total-info">
            Total Mensal: <span id="totalH">0</span> horas
        </div>

        <button class="btn-export" onclick="downloadPDF()">📄 GERAR RELATÓRIO PDF</button>
    </div>
</div>

<div id="pdf-render">
    <div class="pdf-header">
        <h1 style="margin: 0; color: #1e3c72;">RELATÓRIO DE PLANTÕES</h1>
        <p style="margin: 5px 0;">Posto de Trabalho: SILO</p>
    </div>

    <div class="pdf-info-box">
        <div><b>Segurança:</b> <span id="p-name"></span></div>
        <div><b>Data de Emissão:</b> <span id="p-emit"></span></div>
        <div><b>Turno:</b> <span id="p-shift"></span></div>
        <div><b>Mês de Referência:</b> <span id="p-ref"></span></div>
    </div>

    <table class="pdf-table">
        <thead>
            <tr>
                <th>Data</th>
                <th>Dia</th>
                <th>Turno</th>
                <th>Horário</th>
                <th>Carga Horária</th>
            </tr>
        </thead>
        <tbody id="p-table"></tbody>
    </table>

    <div class="pdf-footer">
        <p style="font-size: 16px; margin: 0;"><b>SOMATÓRIA FINAL: <span id="p-total"></span> HORAS</b></p>
    </div>

    <div class="pdf-signatures">
        <div class="sig-line">Assinatura do Segurança</div>
        <div class="sig-line">Assinatura Supervisor</div>
    </div>
</div>

<script>
    let currDate = new Date();
    let shift = 'Diurno';
    let selectedDays = new Map();
    const REF_DATE = new Date(2026, 2, 22);

    function selectShift(s) {
        shift = s;
        document.getElementById('s-day').className = 'btn-shift ' + (s==='Diurno'?'active':'');
        document.getElementById('s-night').className = 'btn-shift ' + (s==='Noturno'?'active':'');
        render();
    }

    function calcHours(y, m, d) {
        if(shift === 'Noturno') return 12;
        const dt = new Date(y, m, d);
        const diff = Math.floor((dt - REF_DATE) / 86400000);
        return (Math.abs(diff) % 2 === 0) ? 13 : 11;
    }

    function render() {
        const y = currDate.getFullYear(), m = currDate.getMonth();
        const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        document.getElementById('labelMonth').innerText = months[m] + " " + y;

        const cal = document.getElementById('cal');
        cal.innerHTML = '';
        const start = new Date(y, m, 1).getDay();
        const days = new Date(y, m+1, 0).getDate();

        for(let i=0; i<start; i++) cal.innerHTML += '<div></div>';
        for(let d=1; d<=days; d++) {
            const key = `${y}-${m}-${d}`;
            const h = calcHours(y, m, d);
            const isS = selectedDays.has(key);
            const div = document.createElement('div');
            div.className = 'day ' + (isS?'selected':'');
            div.innerHTML = `<b>${d}</b><span style="font-size:9px">${h}h</span>`;
            div.onclick = () => {
                isS ? selectedDays.delete(key) : selectedDays.set(key, {d, m, y, h});
                render();
                updateSum();
            };
            cal.appendChild(div);
        }
    }

    function updateSum() {
        let t = 0;
        selectedDays.forEach(v => t += v.h);
        document.getElementById('totalH').innerText = t;
    }

    function changeMonth(v) { currDate.setMonth(currDate.getMonth() + v); render(); }

    async function downloadPDF() {
        const name = document.getElementById('name').value;
        if(selectedDays.size === 0) return alert("Selecione os dias!");

        [span_2](start_span)[span_3](start_span)// Preenche o PDF Oculto[span_2](end_span)[span_3](end_span)
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-emit').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('p-shift').innerText = shift;
        document.getElementById('p-ref').innerText = document.getElementById('labelMonth').innerText;
        
        const table = document.getElementById('p-table');
        table.innerHTML = '';
        const sorted = Array.from(selectedDays.values()).sort((a,b) => a.d - b.d);
        
        sorted.forEach(i => {
            const dt = new Date(i.y, i.m, i.d);
            const diaSem = dt.toLocaleDateString('pt-BR', {weekday:'long'}).split('-')[0];
            const horario = i.h === 12 ? '19:00 - 07:00' : (i.h === 13 ? '06:00 - 19:00' : '07:00 - 18:00');
            table.innerHTML += `<tr>
                <td>${i.d}/${i.m+1}</td>
                <td style="text-transform: capitalize;">${diaSem}</td>
                <td>${shift}</td>
                <td>${horario}</td>
                <td>${i.h}h</td>
            </tr>`;
        });

        document.getElementById('p-total').innerText = document.getElementById('totalH').innerText;

        const opt = {
            margin: 0.3,
            filename: `Plantao_Silo_${name}.pdf`,
            html2canvas: { scale: 2, width: 700 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        const element = document.getElementById('pdf-render');
        element.style.display = 'block';
        await html2pdf().set(opt).from(element).save();
        element.style.display = 'none';
    }

    selectShift('Diurno');
</script>
</body>
</html>
