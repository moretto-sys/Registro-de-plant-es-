<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Silo - Moretto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a2a6c; padding: 10px; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header { background: #1e3c72; color: white; padding: 20px; text-align: center; }
        .content { padding: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #1e3c72; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-shift { padding: 12px; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; background: #f9f9f9; font-weight: bold; }
        .btn-shift.active { border-color: #1e3c72; background: #1e3c72; color: white; }
        .nav-month { display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .nav-month button { background: #1e3c72; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { aspect-ratio: 1; border: 1px solid #eee; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; position: relative; }
        .day.selected-Diurno { background: #ff9800; color: white; font-weight: bold; }
        .day.selected-Noturno { background: #1e3c72; color: white; font-weight: bold; }
        .day.selected-Ambos { background: linear-gradient(135deg, #ff9800 50%, #1e3c72 50%); color: white; font-weight: bold; }
        .total-box { background: #f4f4f4; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; font-size: 18px; border-left: 6px solid #1e3c72; }
        .btn-main { width: 100%; padding: 18px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }

        /* PDF */
        #pdf-render {
            display: none;
            width: 794px;
            padding: 60px 70px;
            background: white;
            color: #111;
            font-family: 'Segoe UI', sans-serif;
        }
        .pdf-title {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #1e3c72;
            padding-bottom: 18px;
        }
        .pdf-title h1 { color: #1e3c72; font-size: 26px; margin-bottom: 6px; }
        .pdf-title p { font-size: 15px; color: #444; }
        .pdf-info {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 28px;
            font-size: 15px;
        }
        .pdf-info div p { margin-bottom: 6px; }
        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 28px;
        }
        .pdf-table th {
            background: #1e3c72;
            color: white;
            padding: 10px 14px;
            border: 1px solid #1e3c72;
            font-size: 14px;
            text-align: center;
        }
        .pdf-table td {
            padding: 9px 14px;
            text-align: center;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .pdf-table tr:nth-child(even) td { background: #f5f7fb; }
        .pdf-total {
            text-align: center;
            border: 2px solid #1e3c72;
            background: #f0f4ff;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #1e3c72;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Posto Silo</h2>
        <p>Controle de Plantão Especial</p>
    </div>
    <div class="content">
        <label>Nome do Segurança</label>
        <input type="text" id="userName" placeholder="Coloque seu nome aqui">

        <label>Turno para Seleção</label>
        <div class="shift-grid">
            <div class="btn-shift active" id="shift-day" onclick="updateShift('Diurno')">☀️ Diurno</div>
            <div class="btn-shift" id="shift-night" onclick="updateShift('Noturno')">🌙 Noturno</div>
        </div>

        <div class="nav-month">
            <button onclick="navMonth(-1)"> &lt; </button>
            <span id="monthDisplay" style="font-weight: bold;"></span>
            <button onclick="navMonth(1)"> &gt; </button>
        </div>

        <div class="calendar" id="calendar"></div>

        <div class="total-box">Total Acumulado: <b id="totalH">0</b> horas</div>

        <button class="btn-main" onclick="processPDF()">📄 GERAR RELATÓRIO PDF</button>
    </div>
</div>

<!-- PDF oculto para renderização -->
<div id="pdf-render">
    <div class="pdf-title">
        <h1>RELATÓRIO DE PLANTÕES</h1>
        <p>POSTO DE TRABALHO: <b>SILO</b></p>
    </div>

    <div class="pdf-info">
        <div>
            <p><b>Segurança:</b> <span id="p-name"></span></p>
            <p><b>Referência:</b> <span id="p-ref"></span></p>
        </div>
        <div>
            <p><b>Emissão:</b> <span id="p-emit"></span></p>
        </div>
    </div>

    <table class="pdf-table">
        <thead>
            <tr>
                <th>Data</th>
                <th>Dia da Semana</th>
                <th>Turno</th>
                <th>Horário</th>
                <th>Horas</th>
            </tr>
        </thead>
        <tbody id="p-body"></tbody>
    </table>

    <div class="pdf-total">
        TOTAL: <span id="p-total"></span> HORAS
    </div>
</div>

<script>
    let date = new Date();
    let currentSelectedShift = 'Diurno';
    // Chave: "YYYY-M-D-Shift" — permite mesmo dia com turnos diferentes
    let selectedRecords = new Map();
    const REF_DATE = new Date(2026, 2, 22);

    function updateShift(s) {
        currentSelectedShift = s;
        document.getElementById('shift-day').className = 'btn-shift ' + (s === 'Diurno' ? 'active' : '');
        document.getElementById('shift-night').className = 'btn-shift ' + (s === 'Noturno' ? 'active' : '');
        render();
    }

    function calcH(y, m, d, s) {
        if (s === 'Noturno') return 12;
        const dt = new Date(y, m, d);
        const diff = Math.floor((dt - REF_DATE) / 86400000);
        return (Math.abs(diff) % 2 === 0) ? 13 : 11;
    }

    function render() {
        const y = date.getFullYear(), m = date.getMonth();
        const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        document.getElementById('monthDisplay').innerText = months[m] + " " + y;

        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        const start = new Date(y, m, 1).getDay();
        const total = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < start; i++) cal.innerHTML += '<div></div>';

        for (let d = 1; d <= total; d++) {
            const keyDay = `${y}-${m}-${d}`;
            const keyRecord = `${keyDay}-${currentSelectedShift}`;

            const hasDiurno = selectedRecords.has(`${keyDay}-Diurno`);
            const hasNoturno = selectedRecords.has(`${keyDay}-Noturno`);

            let statusClass = '';
            if (hasDiurno && hasNoturno) statusClass = 'selected-Ambos';
            else if (hasDiurno) statusClass = 'selected-Diurno';
            else if (hasNoturno) statusClass = 'selected-Noturno';

            const h = calcH(y, m, d, currentSelectedShift);
            const div = document.createElement('div');
            div.className = `day ${statusClass}`;
            div.innerHTML = `<b>${d}</b><span style="font-size:9px">${currentSelectedShift === 'Diurno' ? h + 'h' : '12h'}</span>`;

            div.onclick = () => {
                if (selectedRecords.has(keyRecord)) {
                    selectedRecords.delete(keyRecord);
                } else {
                    selectedRecords.set(keyRecord, { d, m, y, h, s: currentSelectedShift });
                }
                render();
                updateTotal();
            };
            cal.appendChild(div);
        }
    }

    function updateTotal() {
        let t = 0;
        // Soma todas as entradas independente — Diurno e Noturno no mesmo dia somam separado
        selectedRecords.forEach(v => t += v.h);
        document.getElementById('totalH').innerText = t;
    }

    function navMonth(v) {
        date.setMonth(date.getMonth() + v);
        render();
    }

    async function processPDF() {
        const name = document.getElementById('userName').value.trim();
        if (selectedRecords.size === 0) return alert("Selecione os plantões!");

        document.getElementById('p-name').innerText = name;
        document.getElementById('p-emit').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('p-ref').innerText = document.getElementById('monthDisplay').innerText;

        const tbody = document.getElementById('p-body');
        tbody.innerHTML = '';

        // Ordena: por dia, depois Diurno antes de Noturno
        const sorted = Array.from(selectedRecords.values()).sort((a, b) => {
            if (a.y !== b.y) return a.y - b.y;
            if (a.m !== b.m) return a.m - b.m;
            if (a.d !== b.d) return a.d - b.d;
            return a.s === 'Diurno' ? -1 : 1;
        });

        let totalHoras = 0;
        sorted.forEach(i => {
            const dt = new Date(i.y, i.m, i.d);
            const diaSem = dt.toLocaleDateString('pt-BR', { weekday: 'long' }).replace('-feira', '');
            const horario = i.s === 'Noturno' ? '19:00 – 07:00' : (i.h === 13 ? '06:00 – 19:00' : '07:00 – 18:00');
            totalHoras += i.h;
            tbody.innerHTML += `<tr>
                <td>${i.d.toString().padStart(2, '0')}/${(i.m + 1).toString().padStart(2, '0')}/${i.y}</td>
                <td style="text-transform:capitalize">${diaSem}</td>
                <td>${i.s}</td>
                <td>${horario}</td>
                <td><b>${i.h}h</b></td>
            </tr>`;
        });

        document.getElementById('p-total').innerText = totalHoras;

        const element = document.getElementById('pdf-render');
        element.style.display = 'block';

        const opt = {
            margin: 10,
            filename: `Relatorio_Silo_${name}.pdf`,
            html2canvas: { scale: 2, width: 794, windowWidth: 794 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        await html2pdf().set(opt).from(element).save();
        element.style.display = 'none';
    }

    updateShift('Diurno');
</script>
</body>
</html>
